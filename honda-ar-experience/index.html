    .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

<script>
  // Detecta iOS para usar formato correto
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  // Chroma Key — remove fundo verde usando espaço CbCr (melhor qualidade, preserva sombras e cores)
  AFRAME.registerComponent('chromakey', {
    schema: {
      r:          { type: 'float', default: 0.05 },
      g:          { type: 'float', default: 0.78 },
      b:          { type: 'float', default: 0.18 },
      threshold:  { type: 'float', default: 0.28 },
      smoothness: { type: 'float', default: 0.10 }
    },
    init: function () { this.interval = setInterval(() => this.tryApply(), 200); },
    tryApply: function () {
      const mesh = this.el.getObject3D('mesh');
      if (!mesh || !mesh.material || !mesh.material.map) return;
      clearInterval(this.interval);
      const texture = mesh.material.map;
      const d = this.data;
      mesh.material = new THREE.ShaderMaterial({
        uniforms: {
          map:        { value: texture },
          keyColor:   { value: new THREE.Vector3(d.r, d.g, d.b) },
          threshold:  { value: d.threshold },
          smoothness: { value: d.smoothness }
        },
        vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: `
          uniform sampler2D map;
          uniform vec3 keyColor;
          uniform float threshold;
          uniform float smoothness;
          varying vec2 vUv;

          // Distância cromática em espaço CbCr — ignora luminância para preservar sombras
          float chromaDist(vec3 col, vec3 key){
            vec2 c1 = vec2(-0.169*col.r  - 0.331*col.g  + 0.500*col.b,
                            0.500*col.r  - 0.419*col.g  - 0.081*col.b);
            vec2 c2 = vec2(-0.169*key.r  - 0.331*key.g  + 0.500*key.b,
                            0.500*key.r  - 0.419*key.g  - 0.081*key.b);
            return distance(c1, c2);
          }

          void main(){
            vec4 col = texture2D(map, vUv);
            float dist  = chromaDist(col.rgb, keyColor);
            float alpha = smoothstep(threshold - smoothness, threshold + smoothness, dist);
            gl_FragColor = vec4(col.rgb, alpha);
          }`,
        transparent: true, side: THREE.DoubleSide, depthWrite: false,
      });
      this.texture = texture;
    },
    tick: function () { if (this.texture) this.texture.needsUpdate = true; },
  });
</script>

<script>

  const CTA_DELAY = 4000;
  let ctaShown = false, ctaTimer = null;

  function setupVideo() {
    const vid = document.getElementById('hondinha-video');
    const charVideo = document.getElementById('char-video');

    if (isIOS) {
      // iOS Safari: usa vídeo green screen + chroma key shader (melhor qualidade)
      vid.src = 'assets/hondinha-green.mp4';
      charVideo.setAttribute('chromakey', '');
    } else {
      // Android / Chrome / Desktop: WebM com canal alpha nativo
      vid.src = 'assets/hondinha-sem-fundo.webm';
      charVideo.setAttribute('material', 'transparent: true; alphaTest: 0.05; side: double; depthWrite: false');
    }
  }

  function startAR() {
    setupVideo();

    const scene = document.getElementById('ar-scene');
    scene.classList.add('active');
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('hud').classList.add('active');

    scene.addEventListener('loaded', () => {
      const sys = scene.systems['mindar-image-system'];
      if (sys) sys.start();
    }, { once: true });

    setTimeout(() => {
      const sys = scene.systems['mindar-image-system'];
      if (sys && !sys.started) sys.start();
    }, 1500);

    const target = document.getElementById('target-entity');

    target.addEventListener('targetFound', () => {
      document.getElementById('hondinha-video').play().catch(() => {});
      const s = document.getElementById('track-status');
      s.textContent = '● Personagens encontrados';
      s.classList.add('found');
      if (!ctaShown) ctaTimer = setTimeout(() => { launchFireworks(); showCTA(); }, CTA_DELAY);
    });

    target.addEventListener('targetLost', () => {
      document.getElementById('hondinha-video').pause();
      const s = document.getElementById('track-status');
      s.textContent = 'Procurando marcador...';
      s.classList.remove('found');
      clearTimeout(ctaTimer);
    });
  }

  function showCTA() { ctaShown = true; document.getElementById('cta').classList.add('visible'); }

  // ── Fogos reforçados ──
  const COLORS = ['#F5C518','#E00000','#ffffff','#ff6b35','#ffd700','#ff1493','#00cfff'];

  function launchFireworks() {
    const fw = document.getElementById('fireworks');
    // 10 rajadas iniciais intensas
    for (let r = 0; r < 10; r++)
      setTimeout(() => burst(fw, 10 + Math.random()*80, 5 + Math.random()*55, 50), r * 250);
    // segunda rodada
    for (let r = 0; r < 8; r++)
      setTimeout(() => burst(fw, 10 + Math.random()*80, 5 + Math.random()*55, 40), 2600 + r * 200);
    // terceira rodada final
    for (let r = 0; r < 6; r++)
      setTimeout(() => burst(fw, 10 + Math.random()*80, 5 + Math.random()*55, 35), 4800 + r * 200);
    setTimeout(launchConfetti, 200);
    setTimeout(launchConfetti, 2800);
  }

  function burst(c, cx, cy, n) {
    for (let i = 0; i < n; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      const a=(360/n)*i, d=100+Math.random()*160, r=a*Math.PI/180, sz=4+Math.random()*8;
      s.style.cssText=`left:${cx}%;top:${cy}%;background:${COLORS[~~(Math.random()*COLORS.length)]};width:${sz}px;height:${sz}px;--tx:${Math.cos(r)*d}px;--ty:${Math.sin(r)*d}px;animation:burst ${0.8+Math.random()*0.8}s ease-out ${Math.random()*0.2}s forwards;`;
      c.appendChild(s); setTimeout(()=>s.remove(),2200);
    }
  }

  function launchConfetti() {
    const fw = document.getElementById('fireworks');
    for (let i = 0; i < 160; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const dur=2.5+Math.random()*2.5, del=Math.random()*2.5, sz=7+Math.random()*12;
      p.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${COLORS[~~(Math.random()*COLORS.length)]};width:${sz}px;height:${sz*0.4}px;border-radius:${Math.random()>.5?'50%':'1px'};animation:confetti-fall ${dur}s ease-in ${del}s forwards;`;
      fw.appendChild(p); setTimeout(()=>p.remove(),(dur+del)*1000+200);
    }
  }
</script>
